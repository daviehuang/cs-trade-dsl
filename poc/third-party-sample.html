<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acme 报价系统（第三方）· 接入统一 DSL 引擎</title>
<!--
  这是一个【第三方页面】，技术栈、视觉风格都与我们无关（这里故意做成浅色、另一种排版）。
  它只做两件事：
    1) 用一个 <script> 标签引入我们的引擎发行版；
    2) 加载规则集后，调用 UnifiedDSL.runRuleSet(ruleSet, data) 拿结果，绑到自己的界面上。
  引擎是“无界面(headless)”的：它不碰 DOM，只吃数据吐结果。画页面完全是第三方的自由。
-->
<style>
  body { margin:0; background:#f4f6fb; color:#1f2733; font-family:"Microsoft YaHei",Arial,sans-serif; }
  .top { background:#fff; border-bottom:2px solid #e6eaf2; padding:16px 28px; }
  .top b { color:#2563eb; }
  .wrap { max-width:760px; margin:24px auto; padding:0 20px; }
  .panel { background:#fff; border:1px solid #e6eaf2; border-radius:8px; padding:20px; margin-bottom:18px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  h3 { margin:0 0 14px; font-size:15px; color:#3b4658; }
  .row { display:flex; gap:12px; align-items:center; margin-bottom:10px; }
  .row label { width:120px; color:#6b7688; font-size:13px; }
  input { flex:1; padding:8px 10px; border:1px solid #cdd5e2; border-radius:6px; font-size:14px; }
  input:focus { outline:none; border-color:#2563eb; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:8px; text-align:left; font-size:13px; border-bottom:1px solid #eef1f6; }
  th { color:#8a93a3; font-weight:normal; }
  td.calc { color:#2563eb; font-family:Consolas,monospace; }
  .total { font-size:26px; color:#2563eb; font-family:Consolas,monospace; }
  .v-ok { color:#16a34a; } .v-bad { color:#dc2626; }
  .vlist { list-style:none; padding:0; margin:8px 0 0; }
  .vlist li { padding:6px 0; font-size:13px; }
  .tag { font-size:11px; background:#eef2ff; color:#2563eb; padding:2px 8px; border-radius:10px; }
  code { background:#f0f3f9; padding:1px 5px; border-radius:4px; font-size:12px; }
</style>
</head>
<body>
<div class="top">🏢 <b>Acme 报价系统</b> <span class="tag">第三方 · 接入统一 DSL 引擎 v<span id="ver"></span></span></div>

<div class="wrap">
  <div class="panel">
    <h3>报价输入</h3>
    <div class="row"><label>额度 limit</label><input id="limit" value="5000.00" /></div>
    <div class="row"><label>单笔上限</label><input id="maxCharge" value="2000.00" /></div>
    <div class="row"><label>税率 taxRate</label><input id="taxRate" value="0.05" /></div>
    <h3 style="margin-top:18px;">明细行</h3>
    <table>
      <thead><tr><th>amount</th><th>rate</th><th>charge</th><th>fee</th></tr></thead>
      <tbody id="lines"></tbody>
    </table>
  </div>

  <div class="panel">
    <h3>引擎计算结果</h3>
    <div>含税合计：<span class="total" id="total">—</span></div>
    <ul class="vlist" id="vals"></ul>
  </div>

  <div class="panel" style="font-size:13px; color:#6b7688;">
    集成只需两步：① <code>&lt;script src="dist/unified-dsl.js"&gt;</code>
    ② <code>UnifiedDSL.runRuleSet(ruleSet, data)</code>。规则集由我们的 Rule Repository 下发，
    第三方无需知道任何规则细节。
  </div>
</div>

<!-- ① 引入我们引擎的发行版（一个 script 标签）。它是无界面的纯逻辑库 -->
<script src="dist/unified-dsl.js"></script>
<script>
  document.getElementById("ver").textContent = UnifiedDSL.version;

  // ② 加载规则集。生产中：从我们的 Rule Bundle API 拉取（带版本）。
  //    const ruleSet = await fetch("https://rules.yourco.com/fxTradeRules@1.4.0").then(r=>r.json());
  //    本地离线 demo 直接内联一份（内容与 shared/fxTradeRules.json 一致）。
  const ruleSet = {
    ruleSetId:"fxTradeRules", version:"1.4.0", schemaVersion:"1.0", status:"active",
    model:{ root:"Transaction", nodes:{
      Transaction:{ fields:{ limit:{type:"decimal"}, maxCharge:{type:"decimal"}, taxRate:{type:"decimal"},
        status:{type:"string"}, tier:{type:"string"}, total:{type:"decimal",computed:true} },
        children:{ name:"children", node:"TradeLine" } },
      TradeLine:{ fields:{ amount:{type:"decimal"}, rate:{type:"decimal"},
        charge:{type:"decimal",computed:true}, fee:{type:"decimal",computed:true} } } } },
    functions:[{ functionId:"calcFee", version:"1.3.0",
      signature:{ params:{base:"decimal"}, returns:"decimal" }, purity:"pure", determinism:"deterministic" }],
    rules:[
      { id:"calcCharge", type:"formula", scope:"TradeLine", trigger:"calc", target:"charge", expr:"amount * rate" },
      { id:"feeCalc", type:"function", scope:"TradeLine", trigger:"calc", function:"calcFee",
        functionVersion:"1.3.0", params:{ base:"charge" }, target:"fee" },
      { id:"totalPipeline", type:"pipeline", scope:"Transaction", trigger:"calc", target:"total",
        steps:[ {expr:"sum(children.charge) + sum(children.fee)"}, {expr:"value * (1 + root.taxRate)"}, {expr:"round(value, 2)"} ] },
      { id:"chargeCeiling", type:"validation", scope:"TradeLine", trigger:"after-calc",
        expr:"charge <= root.maxCharge", severity:"error", code:"E_CHARGE_CEILING",
        message:"明细费用 {charge} 超过单笔上限 {root.maxCharge}" },
      { id:"limitCheck", type:"validation", scope:"Transaction", trigger:"on-submit",
        expr:"total <= limit", severity:"error", code:"E_LIMIT_EXCEEDED", message:"合计 {total} 超过额度 {limit}" }
    ]
  };

  // 第三方自己的数据 + 界面（与引擎无关）
  const lines = [ { amount:"100.50", rate:"1.2" }, { amount:"200.00", rate:"0.5" } ];

  function collect() {
    return {
      limit: limit.value, maxCharge: maxCharge.value, taxRate: taxRate.value,
      status: "active", tier: "gold",
      children: lines.map(l => ({ amount: l.amount, rate: l.rate }))
    };
  }

  function renderLines() {
    document.getElementById("lines").innerHTML = lines.map((l, i) =>
      `<tr>
        <td><input data-i="${i}" data-f="amount" value="${l.amount}" style="width:90px"/></td>
        <td><input data-i="${i}" data-f="rate" value="${l.rate}" style="width:70px"/></td>
        <td class="calc" id="charge${i}">—</td><td class="calc" id="fee${i}">—</td>
      </tr>`).join("");
  }

  function run() {
    // ③ 调用引擎 —— 这就是全部的集成点
    const res = UnifiedDSL.runRuleSet(ruleSet, collect());

    res.tree.children.forEach((c, i) => {
      document.getElementById("charge"+i).textContent = c.charge ?? "—";
      document.getElementById("fee"+i).textContent = c.fee ?? "—";
    });
    document.getElementById("total").textContent = res.tree.total ?? "—";
    document.getElementById("vals").innerHTML = res.validations.map(v =>
      `<li class="${v.ok ? "v-ok" : "v-bad"}">${v.ok ? "✔" : "✘"} <b>${v.id}</b>
        ${v.ok ? "通过" : "— " + v.message}</li>`).join("");
  }

  document.addEventListener("input", (e) => {
    if (e.target.dataset.i !== undefined) lines[+e.target.dataset.i][e.target.dataset.f] = e.target.value;
    run();
  });

  renderLines();
  run();
</script>
</body>
</html>
